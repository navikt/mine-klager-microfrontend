version: "3.8"

services:
  mine-klager-microfrontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mine-klager-microfrontend
    ports:
      - "3000:3000"
    environment:
      - HOST=0.0.0.0
      - PORT=3000
      - NODE_ENV=production
      - NAIS_CLUSTER_NAME=dev-gcp
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000/api/internal/isAlive').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
